<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOMO 手機點餐系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 pb-24">

    <!-- Header -->
    <div class="bg-amber-400 p-6 sticky top-0 z-20 shadow-sm">
        <h1 class="text-2xl font-black italic">DOMO BREAKFAST</h1>
        <div class="flex justify-between items-center mt-1">
            <p class="text-xs font-bold text-slate-800">2981-4229 | 三重區</p>
            <div class="bg-white/40 px-2 py-0.5 rounded text-[10px] font-bold">手機點餐系統</div>
        </div>
    </div>

    <!-- Category Tabs -->
    <div id="category-tabs" class="flex overflow-x-auto bg-white border-b sticky top-[84px] z-10 no-scrollbar">
        <!-- Tabs will be rendered here -->
    </div>

    <!-- Menu List -->
    <div id="menu-container" class="p-4 space-y-6">
        <!-- Menu items will be rendered here -->
    </div>

    <!-- Cart Bar (Sticky Bottom) -->
    <div id="cart-bar" class="fixed bottom-0 left-0 right-0 p-4 bg-white border-t shadow-[0_-4px_20px_rgba(0,0,0,0.1)] z-30 flex items-center justify-between hidden">
        <div>
            <p id="cart-count" class="text-xs text-gray-500 font-bold">已選 0 項</p>
            <p id="cart-total" class="text-xl font-black text-amber-500">$0</p>
        </div>
        <button onclick="openCheckout()" class="bg-slate-900 text-white px-8 py-3 rounded-2xl font-bold flex items-center gap-2">
            去結帳 <i data-lucide="chevron-right" class="w-5 h-5"></i>
        </button>
    </div>

    <!-- Checkout Modal -->
    <div id="checkout-modal" class="fixed inset-0 bg-white z-[40] overflow-y-auto p-6 pb-24 hidden">
        <div class="flex items-center justify-between mb-8">
            <h2 class="text-2xl font-black">最後一步</h2>
            <button onclick="closeCheckout()" class="p-2 bg-gray-100 rounded-full"><i data-lucide="x"></i></button>
        </div>

        <div class="space-y-6">
            <section>
                <label class="block text-sm font-bold text-gray-400 mb-2 underline decoration-amber-300">1. 請填寫桌號 / 姓名</label>
                <input id="table-input" type="text" placeholder="例如：3桌 或 外帶王先生" class="w-full p-4 bg-gray-50 rounded-xl border-2 border-gray-100 focus:border-amber-400 outline-none font-bold">
            </section>

            <section>
                <label class="block text-sm font-bold text-gray-400 mb-2 underline decoration-amber-300">2. 選擇付款方式</label>
                <div class="grid grid-cols-1 gap-3" id="payment-options">
                    <button onclick="selectPayment('cash')" id="pay-cash" class="payment-btn p-4 rounded-xl border-2 flex items-center gap-4 border-slate-900 bg-slate-900 text-white transition-all">
                        <i data-lucide="banknote"></i> <span class="font-bold">現場付款 / 櫃檯結帳</span>
                    </button>
                    <button onclick="selectPayment('linepay')" id="pay-linepay" class="payment-btn p-4 rounded-xl border-2 flex items-center gap-4 border-gray-100 transition-all">
                        <i data-lucide="smartphone"></i> <span class="font-bold">LINE Pay / 街口 (現場掃碼)</span>
                    </button>
                    <button onclick="selectPayment('crypto')" id="pay-crypto" class="payment-btn p-4 rounded-xl border-2 flex items-center gap-4 border-gray-100 transition-all">
                        <i data-lucide="wallet"></i> <span class="font-bold">虛擬貨幣支付</span>
                    </button>
                </div>
            </section>

            <!-- Crypto Details -->
            <div id="crypto-details" class="bg-indigo-900 text-white p-5 rounded-2xl space-y-4 hidden">
                <div class="flex gap-2">
                    <button onclick="selectCrypto('USDT')" id="crypto-usdt" class="crypto-tab-btn flex-1 py-2 rounded-lg font-bold text-xs bg-white text-indigo-900">USDT (TRC20)</button>
                    <button onclick="selectCrypto('SOL')" id="crypto-sol" class="crypto-tab-btn flex-1 py-2 rounded-lg font-bold text-xs bg-indigo-800">SOL (Solana)</button>
                </div>
                <div class="text-center py-2 border-t border-indigo-700">
                    <p class="text-[10px] opacity-70 mb-1">應付金額</p>
                    <p id="crypto-amount" class="text-2xl font-black">0 USDT</p>
                </div>
                <div class="bg-white p-3 rounded-xl flex flex-col items-center">
                   <div class="w-32 h-32 bg-gray-200 mb-2 flex items-center justify-center text-gray-400 text-[10px]">收款 QR CODE</div>
                   <p id="crypto-address" class="text-[8px] text-gray-400 break-all select-all font-mono">TRC20_ADDRESS_EXAMPLE_123456</p>
                </div>
                <p class="text-[10px] text-center opacity-60">※ 轉帳後請告知老闆您的錢包末 4 碼</p>
            </div>

            <section class="pt-4">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold">訂單明細</h3>
                    <span id="summary-count" class="bg-amber-100 text-amber-700 px-2 py-0.5 rounded text-xs font-bold">共 0 項</span>
                </div>
                <div id="checkout-items" class="max-h-40 overflow-y-auto space-y-2 mb-6">
                    <!-- Items will be listed here -->
                </div>
                
                <button id="submit-btn" onclick="submitOrder()" class="w-full bg-amber-400 text-slate-900 py-4 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all flex items-center justify-center gap-3">
                    <i data-lucide="send" class="w-6 h-6"></i> 送出訂單給老闆
                </button>
            </section>
        </div>
    </div>

    <!-- Success Message Overlay -->
    <div id="success-overlay" class="fixed inset-0 bg-white z-[50] flex flex-col items-center justify-center p-8 text-center hidden">
        <div class="w-24 h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-6">
            <i data-lucide="check-circle-2" class="w-12 h-12"></i>
        </div>
        <h2 class="text-3xl font-black mb-2">點餐成功！</h2>
        <p class="text-gray-500 mb-8 font-bold">老闆已收到您的通知。<br>請至櫃檯或座位稍候。</p>
        <button onclick="location.reload()" class="w-full max-w-xs py-4 bg-slate-900 text-white rounded-2xl font-bold">回首頁點餐</button>
    </div>

    <script>
        // --- 完整數據 ---
        const MENU_DATA = [
            {
                category: "漢堡類",
                description: "可加起司 +10 | 加蛋 +10",
                items: [
                    { name: "豬肉漢堡", price: 35 }, { name: "豬排漢堡", price: 45 },
                    { name: "香雞漢堡", price: 35 }, { name: "鮪魚漢堡", price: 40 },
                    { name: "培根豬肉漢堡", price: 50 }, { name: "蝦肉漢堡", price: 45 },
                    { name: "薯餅漢堡", price: 40 }, { name: "卡啦雞腿堡(原/辣)", price: 60 },
                    { name: "西西里雞腿堡", price: 55 }, { name: "煙燻雞肉漢堡", price: 45 },
                    { name: "檸檬雞柳條漢堡", price: 45 }, { name: "牛肉漢堡", price: 50 }
                ]
            },
            {
                category: "吐司類",
                description: "可加起司 +10",
                items: [
                    { name: "烤豬肉總匯", price: 50 }, { name: "烤豬排總匯", price: 60 },
                    { name: "烤煎蛋吐司", price: 25 }, { name: "烤火腿蛋吐司", price: 30 },
                    { name: "烤起司蛋吐司", price: 30 }, { name: "烤肉鬆蛋吐司", price: 35 },
                    { name: "烤玉米蛋吐司", price: 40 }, { name: "烤培根蛋吐司", price: 40 },
                    { name: "烤鮪魚蛋吐司", price: 40 }, { name: "烤豬肉蛋吐司", price: 40 },
                    { name: "烤豬排蛋吐司", price: 50 }
                ]
            },
            {
                category: "蛋餅類",
                description: "可加起司 +10",
                items: [
                    { name: "原味蛋餅", price: 25 }, { name: "火腿蛋餅", price: 30 },
                    { name: "起司蛋餅", price: 30 }, { name: "熱狗蛋餅", price: 35 },
                    { name: "肉鬆蛋餅", price: 35 }, { name: "玉米蛋餅", price: 40 },
                    { name: "培根蛋餅", price: 40 }, { name: "鮪魚蛋餅", price: 40 },
                    { name: "九層塔蛋餅", price: 30 }, { name: "蔬菜蛋餅", price: 30 },
                    { name: "薯餅蛋餅", price: 40 }, { name: "豬肉蛋餅", price: 40 },
                    { name: "九層塔乳酪絲蛋餅", price: 40 }, { name: "煙燻雞肉蛋餅", price: 45 },
                    { name: "培根起司蛋餅", price: 45 }, { name: "豬排蛋餅", price: 50 }
                ]
            },
            {
                category: "麵類/點心類",
                items: [
                    { name: "鐵板麵(黑/蘑)", price: 55 }, { name: "宮保雞丁麵", price: 60 },
                    { name: "三杯雞丁麵", price: 60 }, { name: "義大利肉醬麵", price: 55 },
                    { name: "地瓜餅", price: 45 }, { name: "熱狗(4條)", price: 25 },
                    { name: "雞塊(5塊)", price: 35 }, { name: "檸檬雞柳條(2條)", price: 30 },
                    { name: "黃金脆薯", price: 35 }, { name: "薯條(細繩)", price: 25 },
                    { name: "蘿蔔糕(2片)", price: 40 }, { name: "煎餃(8顆)", price: 40 },
                    { name: "蔥燒鐵板麵", price: 55 }, { name: "薯餅(一片)", price: 20 },
                    { name: "雞球(8顆)", price: 30 }, { name: "蔥抓餅", price: 40 },
                    { name: "三星蔥餅", price: 45 }, { name: "荷包蛋", price: 15 }
                ]
            },
            {
                category: "飲品",
                description: "中杯價 (大杯 +5)",
                items: [
                    { name: "紅茶", price: 15 }, { name: "奶茶", price: 20 },
                    { name: "鮮奶茶", price: 25 }, { name: "咖啡", price: 25 },
                    { name: "柳橙汁", price: 25 }, { name: "拿鐵咖啡", price: 30 },
                    { name: "豆漿", price: 20 }, { name: "薏仁漿", price: 25 },
                    { name: "綠豆沙", price: 30 }, { name: "可樂", price: 20 },
                    { name: "可爾必思", price: 25 }, { name: "玉米濃湯", price: 40 }
                ]
            },
            {
                category: "組合餐",
                items: [
                    { name: "A餐", price: 55 }, { name: "B餐", price: 65 },
                    { name: "C餐", price: 75 }, { name: "兒童餐", price: 50 }
                ]
            }
        ];

        let cart = [];
        let activeCategory = MENU_DATA[0].category;
        let paymentMethod = 'cash';
        let cryptoType = 'USDT';

        // 初始化
        function init() {
            renderTabs();
            renderMenu();
            lucide.createIcons();
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('category-tabs');
            tabsContainer.innerHTML = MENU_DATA.map(cat => `
                <button onclick="setActiveCategory('${cat.category}')" 
                    class="tab-btn px-6 py-3 whitespace-nowrap font-bold text-sm transition-colors ${activeCategory === cat.category ? 'text-amber-600 border-b-4 border-amber-500' : 'text-gray-400'}">
                    ${cat.category}
                </button>
            `).join('');
        }

        function setActiveCategory(cat) {
            activeCategory = cat;
            renderTabs();
            renderMenu();
        }

        function renderMenu() {
            const container = document.getElementById('menu-container');
            const section = MENU_DATA.find(c => c.category === activeCategory);
            
            let html = `<div>`;
            if (section.description) html += `<p class="text-xs text-amber-600 font-bold mb-3">★ ${section.description}</p>`;
            html += `<div class="grid grid-cols-1 gap-3">`;
            
            section.items.forEach(item => {
                html += `
                    <div class="bg-white p-4 rounded-xl shadow-sm flex justify-between items-start border border-gray-100">
                        <div class="flex-1">
                            <h3 class="font-bold text-gray-800">${item.name}</h3>
                            <p class="text-amber-600 font-black mt-1">$${item.price}</p>
                            <div class="flex gap-2 mt-2">
                                <button onclick='addToCart("${item.name}", ${item.price})' class="bg-gray-100 text-[10px] px-2 py-1 rounded font-bold">原味</button>
                                ${["漢堡類", "吐司類", "蛋餅類"].includes(section.category) ? `<button onclick='addToCart("${item.name}", ${item.price + 10}, "加起司")' class="bg-orange-50 text-orange-600 text-[10px] px-2 py-1 rounded font-bold border border-orange-100">+起司$10</button>` : ''}
                                ${["漢堡類", "麵類/點心類"].includes(section.category) ? `<button onclick='addToCart("${item.name}", ${item.price + 10}, "加蛋")' class="bg-amber-50 text-amber-700 text-[10px] px-2 py-1 rounded font-bold border border-amber-100">+加蛋$10</button>` : ''}
                                ${section.category === "飲品" ? `<button onclick='addToCart("${item.name}", ${item.price + 5}, "大杯")' class="bg-blue-50 text-blue-600 text-[10px] px-2 py-1 rounded font-bold border border-blue-100">大杯+$5</button>` : ''}
                            </div>
                        </div>
                        <button onclick='addToCart("${item.name}", ${item.price})' class="bg-amber-400 p-2 rounded-lg text-white shadow-sm active:scale-90 transition-transform">
                            <i data-lucide="shopping-cart" class="w-5 h-5"></i>
                        </button>
                    </div>
                `;
            });
            html += `</div></div>`;
            container.innerHTML = html;
            lucide.createIcons();
        }

        function addToCart(name, price, extra = "") {
            cart.push({ name, price, extra, id: Date.now() });
            updateCartBar();
        }

        function updateCartBar() {
            const bar = document.getElementById('cart-bar');
            if (cart.length > 0) {
                bar.classList.remove('hidden');
                document.getElementById('cart-count').innerText = `已選 ${cart.length} 項`;
                const total = cart.reduce((s, i) => s + i.price, 0);
                document.getElementById('cart-total').innerText = `$${total}`;
            } else {
                bar.classList.add('hidden');
            }
        }

        function openCheckout() {
            document.getElementById('checkout-modal').classList.remove('hidden');
            renderCheckoutItems();
            updateCryptoUI();
        }

        function closeCheckout() {
            document.getElementById('checkout-modal').classList.add('hidden');
        }

        function renderCheckoutItems() {
            const container = document.getElementById('checkout-items');
            container.innerHTML = cart.map(item => `
                <div class="flex justify-between text-sm py-1 border-b border-gray-50">
                    <span class="text-gray-600">${item.name} ${item.extra ? `<small class="text-amber-600">[${item.extra}]</small>` : ''}</span>
                    <span class="font-bold">$${item.price}</span>
                </div>
            `).join('');
            document.getElementById('summary-count').innerText = `共 ${cart.length} 項`;
        }

        function selectPayment(method) {
            paymentMethod = method;
            document.querySelectorAll('.payment-btn').forEach(btn => {
                btn.className = "payment-btn p-4 rounded-xl border-2 flex items-center gap-4 border-gray-100 transition-all";
            });
            
            const activeBtn = document.getElementById(`pay-${method}`);
            if (method === 'cash') activeBtn.className = "payment-btn p-4 rounded-xl border-2 flex items-center gap-4 border-slate-900 bg-slate-900 text-white transition-all";
            if (method === 'linepay') activeBtn.className = "payment-btn p-4 rounded-xl border-2 flex items-center gap-4 border-green-500 bg-green-50 text-green-700 transition-all";
            if (method === 'crypto') activeBtn.className = "payment-btn p-4 rounded-xl border-2 flex items-center gap-4 border-indigo-500 bg-indigo-50 text-indigo-700 transition-all";

            const cryptoDetails = document.getElementById('crypto-details');
            if (method === 'crypto') cryptoDetails.classList.remove('hidden');
            else cryptoDetails.classList.add('hidden');
        }

        function selectCrypto(type) {
            cryptoType = type;
            document.querySelectorAll('.crypto-tab-btn').forEach(btn => btn.classList.replace('bg-white', 'bg-indigo-800'));
            document.querySelectorAll('.crypto-tab-btn').forEach(btn => btn.classList.replace('text-indigo-900', 'text-white'));
            
            const activeBtn = document.getElementById(`crypto-${type.toLowerCase()}`);
            activeBtn.classList.replace('bg-indigo-800', 'bg-white');
            activeBtn.classList.add('text-indigo-900');
            updateCryptoUI();
        }

        function updateCryptoUI() {
            const total = cart.reduce((s, i) => s + i.price, 0);
            if (cryptoType === 'USDT') {
                document.getElementById('crypto-amount').innerText = `${(total / 32.5).toFixed(2)} USDT`;
                document.getElementById('crypto-address').innerText = "TRC20_ADDRESS_EXAMPLE_123456";
            } else {
                document.getElementById('crypto-amount').innerText = `${(total / 32 / 150).toFixed(4)} SOL`;
                document.getElementById('crypto-address').innerText = "SOL_ADDRESS_EXAMPLE_SOL_CHAIN_789";
            }
        }

        function submitOrder() {
            const table = document.getElementById('table-input').value;
            if (!table) {
                alert("請填寫桌號或姓名！");
                return;
            }

            const btn = document.getElementById('submit-btn');
            btn.innerText = "傳送中...";
            btn.disabled = true;

            // 模擬傳送 LINE Notify
            setTimeout(() => {
                document.getElementById('success-overlay').classList.remove('hidden');
                lucide.createIcons();
            }, 1500);
        }

        window.onload = init;
    </script>
</body>
</html>
